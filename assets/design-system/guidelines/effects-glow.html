<!-- @dsCard group="Effects" viewport="700x190" name="Sombras pixel & movimento" subtitle="Sombras duras deslocadas, glow radial, blink e floaty" -->
<!DOCTYPE html><html><head><link rel="stylesheet" href="../styles.css"><style>body{margin:0;padding:24px;background:var(--bg-page);display:flex;gap:28px;align-items:center}</style></head><body>
<a class="cd-btn cd-btn--primary cd-btn--md" href="#">Ver projetos</a>
<div style="width:150px;height:90px;background:var(--preto-1);border:1px solid var(--borda);box-shadow:var(--shadow-card);display:flex;align-items:flex-end;padding:10px;font-size:11px;color:var(--cinza);font-family:var(--font-body)">--shadow-card<br>8px 8px 0</div>
<div style="font-family:var(--font-terminal);font-size:19px;color:var(--verde)">&gt; blink<span class="cd-cursor" style="margin-left:5px"></span></div>
<div style="font-family:var(--font-terminal);font-size:24px;color:var(--amarelo);animation:floaty 4s ease-in-out infinite">+</div>
<div style="font-size:12px;color:var(--cinza);max-width:190px;font-family:var(--font-body)">hover: translate(-2px,-2px) no botão, borda amarela + translateY(-3px) nos cards. Transições .12–.15s.</div>
</body></html>
