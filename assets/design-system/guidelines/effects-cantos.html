<div class="bx" style="background:var(--preto-1);border:1px solid var(--borda)">borda 1px #2c2c2c</div>
<div class="bx" style="background:var(--preto-1);border:1px solid var(--borda);border-top:2px solid var(--amarelo)">filete superior amarelo</div>
<div class="bx" style="background:var(--preto-1);border:1px solid var(--amarelo)">destaque: borda amarela</div>

</body></html>
